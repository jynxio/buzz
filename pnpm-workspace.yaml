packages:
    - apps/*
    - packages/*
    - playgrounds/*
    - tools/*

catalog:
    "@base-ui/react": ^1
    "@electron-toolkit/preload": ^3.0.2
    "@electron-toolkit/tsconfig": ^2.0.0
    "@electron-toolkit/utils": ^4.0.0
    "@total-typescript/ts-reset": 0.6.1
    "@tsdown/css": 0.21.4
    "@types/node": ^25.5.0
    "@types/react": ^19.2.14
    "@types/react-dom": ^19.2.3
    "@vitejs/plugin-react": ^6.0.1
    electron: ^41.1.1
    electron-builder: ^26.8.1
    electron-vite: ^5.0.0
    react: ^19.2.4
    react-dom: ^19.2.4
    typescript: ^6.0.2
    vite: npm:@voidzero-dev/vite-plus-core@^0.1.15
    vite-plus: ^0.1.15
    vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
    vite: "catalog:"
    vitest: "catalog:"
peerDependencyRules:
    allowAny:
        - vite
        - vitest
    allowedVersions:
        vite: "*"
        vitest: "*"
